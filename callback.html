<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入中... - 家庭共享計畫</title>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e9ecef;
            border-top: 4px solid #06C755;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>正在驗證 LINE 登入...</p>
    </div>

    <script>
        // LINE Login Configuration
        const LINE_CHANNEL_ID = '2009276934';
        const LINE_CHANNEL_SECRET = '5518fca16af81f0a9ae52c8b3ee31edd';
        const CALLBACK_URL = 'https://familyshare.online/callback.html';
        const API_URL = ''; // Same domain

        // Get authorization code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            alert('登入失敗: ' + error);
            window.location.href = 'login.html';
        } else if (code) {
            // Exchange code for access token
            fetch('https://api.line.me/oauth2/v2.1/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: CALLBACK_URL,
                    client_id: LINE_CHANNEL_ID,
                    client_secret: LINE_CHANNEL_SECRET
                })
            })
            .then(response => response.json())
            .then(async data => {
                console.log('LINE token response:', JSON.stringify(data));
                
                if (data.access_token) {
                    // Get user profile
                    const profileResponse = await fetch('https://api.line.me/v2/profile', {
                        headers: {
                            'Authorization': 'Bearer ' + data.access_token
                        }
                    });
                    const userProfile = await profileResponse.json();
                    console.log('LINE profile response:', JSON.stringify(userProfile));

                    // Get user email
                    let lineEmail = '';
                    
                    // Try to get email from id_token if available
                    if (data.id_token) {
                        try {
                            // Decode id_token to get email claim (base64 encoded JSON)
                            const idTokenParts = data.id_token.split('.');
                            if (idTokenParts.length >= 2) {
                                const payload = JSON.parse(atob(idTokenParts[1]));
                                console.log('ID Token payload:', JSON.stringify(payload));
                                if (payload.email) {
                                    lineEmail = payload.email;
                                }
                            }
                        } catch (e) {
                            console.log('Failed to parse id_token:', e);
                        }
                    }
                    
                    // If no email from id_token, try API
                    if (!lineEmail) {
                        try {
                            const emailResponse = await fetch('https://api.line.me/v2/userinfo', {
                                headers: {
                                    'Authorization': 'Bearer ' + data.access_token
                                }
                            });
                            const emailData = await emailResponse.json();
                            console.log('LINE userinfo response:', JSON.stringify(emailData));
                            lineEmail = emailData.email || '';
                        } catch (e) {
                            console.log('Email API error:', e);
                        }
                    }

                    console.log('LINE email collected:', lineEmail);
                    console.log('Sending to server - line_email:', lineEmail);

                    // Send user data to server to save in database
                    const requestBody = {
                        line_user_id: userProfile.userId,
                        line_display_name: userProfile.displayName,
                        line_picture_url: userProfile.pictureUrl,
                        line_email: lineEmail,
                        access_token: data.access_token,
                        refresh_token: data.refresh_token,
                        expires_in: data.expires_in
                    };
                    console.log('Request body:', JSON.stringify(requestBody));
                    
                    const serverResponse = await fetch(`${API_URL}/api/line-callback`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    const serverData = await serverResponse.json();
                    console.log('Server response:', JSON.stringify(serverData));

                    if (serverData.success) {
                        // Store user info in localStorage
                        localStorage.setItem('userId', serverData.user.id);
                        localStorage.setItem('username', serverData.user.username);
                        localStorage.setItem('line_displayName', userProfile.displayName);
                        localStorage.setItem('line_pictureUrl', userProfile.pictureUrl);
                        localStorage.setItem('line_email', lineEmail);
                        localStorage.setItem('email', lineEmail);
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('loginMethod', 'line');
                        
                        // Store token if available
                        if (serverData.token) {
                            localStorage.setItem('token', serverData.token);
                        }
                        
                        // Redirect to dashboard or home with small delay
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        throw new Error(serverData.message || '儲存失敗');
                    }
                } else {
                    throw new Error('無法取得 access token');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('登入發生錯誤，請重試');
                window.location.href = 'login.html';
            });
        } else {
            // No code, redirect to login
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
