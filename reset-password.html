<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - 家庭共享計畫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2d3436; --accent: #0984e3; --light: #f8f9fa; --text: #636e72; --white: #ffffff; }
        body { font-family: 'Noto Sans TC', sans-serif; line-height: 1.6; color: var(--primary); background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: var(--white); padding: 3rem; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--primary); }
        .header p { color: var(--text); font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--primary); }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .submit-btn:hover { background: #0773c5; transform: translateY(-2px); }
        .submit-btn:disabled { background: #b2bec3; cursor: not-allowed; transform: none; }
        .message { padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; text-align: center; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: var(--accent); text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 重設密碼</h1>
            <p id="subtitle">請輸入您的新密碼</p>
        </div>
        
        <div id="message" class="message hidden"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group" id="tokenGroup">
                <label for="token">驗證碼</label>
                <input type="text" id="token" required>
            </div>
            
            <div class="form-group">
                <label for="newPassword">新密碼</label>
                <input type="password" id="newPassword" placeholder="至少 6 個字元" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" placeholder="再次輸入新密碼" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">重設密碼</button>
        </form>
        
        <div class="back-link">
            <a href="login.html">← 返回登入</a>
        </div>
    </div>

    <script>
        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const urlEmail = urlParams.get('email');
        
        // If token exists in URL, pre-fill and hide email field
        if (urlToken && urlEmail) {
            document.getElementById('email').value = urlEmail;
            document.getElementById('email').readOnly = true;
            document.getElementById('token').value = urlToken;
            document.getElementById('subtitle').textContent = '請輸入您的新密碼';
        } else {
            document.getElementById('tokenGroup').classList.add('hidden');
            document.getElementById('subtitle').textContent = '請輸入您的電子郵件';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // Validation
            if (newPassword !== confirmPassword) {
                showMessage('兩次輸入的密碼不一致', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('密碼至少需要 6 個字元', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '處理中...';
            
            try {
                // If no token in URL, send forgot password request
                if (!urlToken) {
                    const response = await fetch('/api/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await response.json();
                    showMessage(data.message, data.success ? 'success' : 'error');
                } else {
                    // Reset password
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, token, newPassword })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        showMessage(data.message + ' 正在跳轉到登入頁面...', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        showMessage(data.message, 'error');
                    }
                }
            } catch (err) {
                showMessage('發生錯誤，請稍後再試', 'error');
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = '重設密碼';
        });
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
