<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 家庭共享計畫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --light: #f8f9fa;
            --text: #636e72;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            color: var(--primary);
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text);
            font-size: 0.95rem;
        }

        .login-divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .login-divider span {
            padding: 0 1rem;
            color: var(--text);
            font-size: 0.85rem;
        }

        .line-login-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #06C755;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .line-login-btn:hover {
            background: #05b04a;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(6, 199, 85, 0.3);
        }

        .apple-login-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #000000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .apple-login-btn:hover {
            background: #333333;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .google-login-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #ffffff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .google-login-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .kkid-login-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #003670;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .kkid-login-btn:hover {
            background: #002a54;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 54, 112, 0.3);
        }

        .email-login-section {
            margin-top: 1.5rem;
        }

        .email-login-toggle {
            display: block;
            width: 100%;
            padding: 1rem;
            background: var(--light);
            color: var(--primary);
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .email-login-toggle:hover {
            background: #e9ecef;
        }

        .email-login-form {
            display: none;
            margin-top: 1rem;
        }

        .email-login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #0769b5;
        }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="family-logo.png" alt="Logo" style="height: 60px; margin-bottom: 1rem;">
            <h1>家庭共享計畫</h1>
            <p>會員登入</p>
        </div>

        <!-- LINE Login (移到最上方) -->
        <a href="https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=2009276934&redirect_uri=https%3A%2F%2Ffamilyshare.online%2Fcallback.html&state=STATE&scope=openid%20profile%20email" class="line-login-btn">
            📱 使用 LINE 登入
        </a>

        <!-- Apple Sign In -->
        <a href="javascript:void(0)" class="apple-login-btn" onclick="appleSignIn()">
            🍎 使用 Apple ID 登入
        </a>

        <!-- Google Login -->
        <a href="#" class="google-login-btn" id="googleLoginBtn" onclick="googleLogin()">
            🔵 使用 Google 帳號 登入
        </a>

        <!-- KKID Login -->
        <a href="#" class="kkid-login-btn" id="kkidLoginBtn" onclick="kkidLogin()">
            🎵 使用 KKID 登入
        </a>

        <div class="login-divider">
            <span>或</span>
        </div>

        <!-- Email Login Toggle -->
        <div class="email-login-section">
            <button class="email-login-toggle" onclick="toggleEmailLogin()">
                ✉️ 使用 Email / 密碼 登入
            </button>

            <!-- Email Login Form -->
            <form class="email-login-form" id="emailLoginForm" onsubmit="handleEmailLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="輸入您的 Email">
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" required placeholder="輸入您的密碼">
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="submit-btn">登入</button>
                <a href="#" class="register-link" onclick="showRegister()">還沒有帳號？註冊</a>
            </form>

            <!-- Register Form -->
            <form class="email-login-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regUsername">用戶名</label>
                    <input type="text" id="regUsername" name="username" required placeholder="設定用戶名">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" required placeholder="輸入您的 Email">
                </div>
                <div class="form-group">
                    <label for="regPassword">密碼</label>
                    <input type="password" id="regPassword" name="password" required placeholder="設定密碼（至少6位）">
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">確認密碼</label>
                    <input type="password" id="regConfirmPassword" name="confirmPassword" required placeholder="再次輸入密碼">
                </div>
                <div class="error-message" id="registerError"></div>
                <button type="submit" class="submit-btn">註冊</button>
                <a href="#" class="register-link" onclick="showLogin()">已有帳號？登入</a>
            </form>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        function toggleEmailLogin() {
            const form = document.getElementById('emailLoginForm');
            form.classList.toggle('active');
        }

        function showRegister() {
            document.getElementById('emailLoginForm').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('emailLoginForm').classList.add('active');
        }

        function appleSignIn() {
            // Apple Sign In would require registering with Apple Developer
            // For now, redirect to email login as alternative
            alert('Apple ID 登入功能敬請期待！\n\n目前支援 Google 登入和 Email/密碼 登入。');
            document.getElementById('emailLoginForm').classList.add('active');
        }

        function googleLogin() {
            // Fetch Google Client ID from server and redirect
            fetch('/api/config/google-client-id')
                .then(res => res.json())
                .then(data => {
                    if (data.clientId) {
                        const redirectUri = encodeURIComponent('https://familyshare.online/google-callback.html');
                        const googleAuthUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${data.clientId}&redirect_uri=${redirectUri}&response_type=code&scope=openid%20email%20profile`;
                        window.location.href = googleAuthUrl;
                    } else {
                        alert('Google 登入尚未設定');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('無法載入 Google 登入設定');
                });
        }

        function kkidLogin() {
            // Fetch KKBOX Client ID from server and redirect
            fetch('/api/config/kkbox-client-id')
                .then(res => res.json())
                .then(data => {
                    if (data.clientId) {
                        const redirectUri = encodeURIComponent('https://familyshare.online/kkid-callback.html');
                        // Generate random state for security
                        const state = Math.random().toString(36).substring(7);
                        // KKBOX OAuth authorization endpoint (from official docs)
                        const kkboxAuthUrl = `https://account.kkbox.com/oauth2/authorize?redirect_uri=${redirectUri}&client_id=${data.clientId}&response_type=code&state=${state}`;
                        window.location.href = kkboxAuthUrl;
                    } else {
                        alert('KKID 登入尚未設定');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('無法載入 KKID 登入設定');
                });
        }

        async function handleEmailLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('email', data.user.email);
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = '登入失敗，請稍後再試';
                errorDiv.style.display = 'block';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorDiv = document.getElementById('registerError');

            if (password !== confirmPassword) {
                errorDiv.textContent = '密碼與確認密碼不一致';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = '密碼至少需要6個字元';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    alert('註冊成功！請登入');
                    showLogin();
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = '註冊失敗，請稍後再試';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
