<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的奖励 - 家庭共享计画</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --light: #f8f9fa;
            --text: #636e72;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            color: var(--primary);
            background: var(--light);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 40px;
            margin-right: 8px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            margin-left: 2rem;
            font-weight: 400;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .user-menu {
            position: relative;
            display: inline-block;
            margin-left: 1rem;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .user-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 180px;
            overflow: hidden;
            z-index: 1001;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-menu a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--primary);
            text-decoration: none;
            transition: background 0.3s;
        }

        .dropdown-menu a:hover {
            background: var(--light);
        }

        .dropdown-menu .icon {
            margin-right: 12px;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 120px auto 40px;
            padding: 0 5%;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .user-info {
            background: var(--white);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .user-details p {
            color: var(--text);
        }

        .logout-btn {
            margin-left: auto;
            padding: 0.75rem 1.5rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Subscriptions Grid */
        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .subscription-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .subscription-card:hover {
            transform: translateY(-5px);
        }

        .subscription-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .subscription-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: contain;
        }

        .subscription-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .subscription-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .subscription-details {
            color: var(--text);
            font-size: 0.95rem;
        }

        .subscription-details p {
            margin-bottom: 0.5rem;
        }

        .no-subscriptions {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text);
        }

        .no-subscriptions-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .browse-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .browse-btn:hover {
            background: #0769b5;
        }

        /* Order details */
        .order-details {
            background: var(--white);
            padding: 2rem;
            border-radius: 16px;
            margin-top: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .order-details h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-product {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .order-product img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: contain;
        }

        .order-product-name {
            font-weight: 600;
        }

        .order-product-info {
            font-size: 0.85rem;
            color: var(--text);
        }

        .order-price {
            text-align: right;
        }

        .order-price-original {
            font-size: 0.85rem;
            color: var(--text);
            text-decoration: line-through;
        }

        .order-price-final {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .order-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .status-processing {
            background: #cce5ff;
            color: #004085;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .order-date {
            font-size: 0.85rem;
            color: var(--text);
        }

        .order-id {
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="family-logo.png" alt="Logo">
            家庭共享計畫
        </a>
        <nav>
            <a href="index.html">首頁</a>
            <div class="user-menu" id="userMenu" style="display: none;">
                <div class="user-icon" onclick="toggleDropdown()">
                    <img id="userAvatar" src="" alt="User">
                </div>
                <div class="dropdown-menu" id="userDropdown">
                    <a href="subscriptions.html">
                        <span class="icon">📋</span>
                        我的訂閱
                    </a>
                    <a href="rewards.html">
                        <span class="icon">🎁</span>
                        我的獎勵
                    </a>
                    <a href="#" onclick="logout()">
                        <span class="icon">🚪</span>
                        登出
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">我的奖励</h1>
        
        <!-- Logged out state -->
        <div id="loggedOutContent" style="display: none;">
            <div class="login-prompt">
                <h2>請先登入</h2>
                <p>登入後即可查看您的獎勵資訊</p>
                <a href="login.html">立即登入</a>
            </div>
        </div>

        <!-- Logged in state -->
        <div id="loggedInContent" style="display: none;">
            <!-- Commission Summary -->
            <div id="commissionSummary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                <div style="text-align: center;">
                    <div style="font-size: 1rem; opacity: 0.9; margin-bottom: 0.5rem;">總獎勵點數</div>
                    <div id="totalCommission" style="font-size: 3rem; font-weight: 700;">0</div>
                    <div style="display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; font-size: 0.9rem; opacity: 0.9;">
                        <div>折扣碼: <span id="discountCodesCount">0</span></div>
                        <div>訂單總數: <span id="ordersCount">0</span></div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders Section -->
            <div>
                <h2 style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary);">近五筆使用折扣碼的訂單</h2>
                <div class="subscriptions-grid" id="discountCodesList">
                    <!-- Discount codes will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(event) {
            const userMenu = document.querySelector('.user-menu');
            const dropdown = document.getElementById('userDropdown');
            if (userMenu && !userMenu.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Check login status and load data
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const isDebug = urlParams.get('debug') === '1';
            
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userMenu = document.getElementById('userMenu');
            const loggedOutContent = document.getElementById('loggedOutContent');
            const loggedInContent = document.getElementById('loggedInContent');
            
            if (isDebug) {
                console.log('isLoggedIn:', isLoggedIn);
                console.log('userId:', localStorage.getItem('userId'));
                console.log('username:', localStorage.getItem('username'));
                console.log('line_email:', localStorage.getItem('line_email'));
                alert('isLoggedIn: ' + isLoggedIn + '\nuserId: ' + localStorage.getItem('userId'));
            }

            if (!isLoggedIn) {
                loggedOutContent.style.display = 'block';
                loggedInContent.style.display = 'none';
                return;
            }

            // Show logged in UI
            userMenu.style.display = 'inline-block';
            loggedOutContent.style.display = 'none';
            loggedInContent.style.display = 'block';

            // Load user info
            const linePictureUrl = localStorage.getItem('line_pictureUrl');
            const lineDisplayName = localStorage.getItem('line_displayName');
            const username = localStorage.getItem('username');

            // Update header user avatar if exists
            const userAvatar = document.getElementById('userAvatar');
            if (userAvatar && linePictureUrl) {
                userAvatar.src = linePictureUrl;
            } else if (userAvatar) {
                userAvatar.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
            }

            // Get userId
            const userId = localStorage.getItem('userId');

            // Load commission and discount codes
            if (userId) {
                loadCommission(userId);
                loadDiscountCodes(userId);
            }
        }

        // Load commission summary
        function sendVerificationEmail() {
            const userId = localStorage.getItem('userId');
            const email = document.getElementById('profileEmail').textContent;
            const messageEl = document.getElementById('verifyMessage');
            const sendBtn = document.getElementById('sendVerifyBtn');
            
            if (!userId || !email || email === '-') {
                messageEl.textContent = '❌ 無法發送驗證信';
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = '發送中...';
            messageEl.textContent = '';

            fetch('/api/send-verification-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, email: email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    messageEl.textContent = '✅ 驗證信已發送，請檢查您的信箱！';
                    sendBtn.textContent = '已發送';
                } else {
                    messageEl.textContent = '❌ ' + (data.message || '發送失敗');
                    sendBtn.disabled = false;
                    sendBtn.textContent = '發送驗證信';
                }
            })
            .catch(err => {
                console.error('Error sending verification email:', err);
                messageEl.textContent = '❌ 發送失敗，請稍後再試';
                sendBtn.disabled = false;
                sendBtn.textContent = '發送驗證信';
            });
        }

        function loadSubscriptions() {
            const subscriptionsList = document.getElementById('subscriptionsList');
            const userId = localStorage.getItem('userId');
            
            if (!userId) {
                subscriptionsList.innerHTML = `
                    <div class="no-subscriptions" style="grid-column: 1 / -1;">
                        <div class="no-subscriptions-icon">📦</div>
                        <h3>尚無訂閱</h3>
                        <p>您目前沒有任何奖励中心</p>
                        <a href="index.html#subscriptions" class="browse-btn">瀏覽奖励中心</a>
                    </div>
                `;
                return;
            }

            // Fetch orders from API
            fetch(`/api/orders/by-user?user_id=${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.orders.length > 0) {
                        renderOrders(data.orders);
                    } else {
                        subscriptionsList.innerHTML = `
                            <div class="no-subscriptions" style="grid-column: 1 / -1;">
                                <div class="no-subscriptions-icon">📦</div>
                                <h3>尚無訂閱</h3>
                                <p>您目前沒有任何奖励中心</p>
                                <a href="index.html#subscriptions" class="browse-btn">瀏覽奖励中心</a>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    console.error('Error loading orders:', err);
                    subscriptionsList.innerHTML = `
                        <div class="no-subscriptions" style="grid-column: 1 / -1;">
                            <div class="no-subscriptions-icon">⚠️</div>
                            <h3>載入失敗</h3>
                            <p>無法載入訂單資料，請稍後再試</p>
                        </div>
                    `;
                });
        }

        function renderOrders(orders) {
            const subscriptionsList = document.getElementById('subscriptionsList');
            
            const productIcons = {
                'youtube': 'youtube-premium.png',
                'kkbox': 'kkbox.png',
                'microsoft365': 'microsoft365.png'
            };

            const productNames = {
                'youtube': 'YouTube Premium 家庭方案',
                'kkbox': 'KKBOX 家庭方案',
                'microsoft365': 'Microsoft 365 進階版'
            };

            const statusLabels = {
                'pending': '待處理',
                'paid': '已付款',
                'processing': '處理中',
                'completed': '已完成',
                'cancelled': '已取消'
            };

            const html = orders.map(order => {
                const productIcon = productIcons[order.product_type] || 'family-logo.png';
                const productName = productNames[order.product_type] || order.product_type;
                const statusLabel = statusLabels[order.status] || order.status;
                const statusClass = `status-${order.status}`;
                const orderDate = new Date(order.created_at).toLocaleString('zh-TW');
                
                let priceDisplay = `<span class="order-price-final">NT$ ${order.final_price}</span>`;
                if (order.discount_amount > 0) {
                    priceDisplay = `
                        <span class="order-price-original">NT$ ${order.original_price}</span><br>
                        <span class="order-price-final">NT$ ${order.final_price}</span>
                    `;
                }

                return `
                    <div class="subscription-card">
                        <div class="subscription-header">
                            <img src="${productIcon}" alt="${productName}" class="subscription-icon">
                            <div class="subscription-title">${productName}</div>
                        </div>
                        <span class="subscription-status ${statusClass}">${statusLabel}</span>
                        <div class="subscription-details">
                            <p>💰 價格: ${priceDisplay}</p>
                            <p>📅 方案時長: ${order.plan_duration_months} 個月</p>
                            <p>👤 子帳戶數: ${order.sub_accounts} 個</p>
                            ${order.discount_code ? `<p>🎫 優惠碼: ${order.discount_code}</p>` : ''}
                            <p class="order-date">📆 訂單日期: ${orderDate}</p>
                            <p class="order-id">訂單編號: ${order.order_id}</p>
                        </div>
                    </div>
                `;
            }).join('');

            subscriptionsList.innerHTML = html;
        }

        // Load commission summary
        function loadCommission(userId) {
            fetch(`/api/commission/by-user?user_id=${userId}`)
                .then(res => res.json())
                .then(data => {
                    console.log('Commission data:', data);
                    if (data.success) {
                        const commission = parseFloat(data.total_commission) || 0;
                        document.getElementById('totalCommission').textContent = commission;
                        document.getElementById('discountCodesCount').textContent = data.discount_codes_count || 0;
                        document.getElementById('ordersCount').textContent = data.orders_count || 0;
                        
                        // Display user's discount codes
                        if (data.discount_codes && data.discount_codes.length > 0) {
                            const codes = data.discount_codes.map(c => c.code).join(', ');
                            document.getElementById('discountCodesCount').textContent = codes;
                        }
                    }
                })
                .catch(err => {
                    console.error('Error loading commission:', err);
                });
        }

        // Load orders by discount codes
        function loadDiscountCodes(userId) {
            const discountCodesList = document.getElementById('discountCodesList');
            
            fetch(`/api/orders/by-discount-codes?user_id=${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.orders && data.orders.length > 0) {
                        renderOrders(data.orders);
                    } else {
                        discountCodesList.innerHTML = `
                            <div class="no-subscriptions" style="grid-column: 1 / -1;">
                                <div class="no-subscriptions-icon">📦</div>
                                <h3>尚無訂單</h3>
                                <p>目前沒有使用您折扣碼的訂單</p>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    console.error('Error loading orders:', err);
                    discountCodesList.innerHTML = `
                        <div class="no-subscriptions" style="grid-column: 1 / -1;">
                            <div class="no-subscriptions-icon">⚠️</div>
                            <h3>載入失敗</h3>
                            <p>無法載入訂單資料，請稍後再試</p>
                        </div>
                    `;
                });
        }

        function renderOrders(orders) {
            const discountCodesList = document.getElementById('discountCodesList');
            
            const productNames = {
                'youtube': 'YouTube Premium 家庭方案',
                'kkbox': 'KKBOX 家庭方案',
                'microsoft365': 'Microsoft 365 進階版'
            };

            const statusLabels = {
                'pending': '待處理',
                'paid': '已付款',
                'processing': '處理中',
                'completed': '已完成',
                'cancelled': '已取消'
            };

            const html = orders.map(order => {
                const productName = productNames[order.product_type] || order.product_type;
                const statusLabel = statusLabels[order.status] || order.status;
                const statusClass = `status-${order.status}`;
                const orderDate = new Date(order.created_at).toLocaleString('zh-TW');
                
                return `
                    <div class="subscription-card">
                        <div class="subscription-header">
                            <div class="subscription-title">${productName}</div>
                        </div>
                        <span class="subscription-status ${statusClass}">${statusLabel}</span>
                        <div class="subscription-details">
                            <p>🎫 折扣碼: ${order.discount_code || '-'}</p>
                            <p>💰 獎勵點數: ${order.commission || 0}</p>
                            <p>📅 方案時長: ${order.plan_duration_months} 個月</p>
                            <p>👤 購買人: ${order.buyer_username || order.buyer_email || '-'}</p>
                            <p class="order-date">📆 訂單日期: ${orderDate}</p>
                            <p class="order-id">訂單編號: ${order.order_id}</p>
                        </div>
                    </div>
                `;
            }).join('');

            discountCodesList.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
